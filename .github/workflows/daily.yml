name: Daily Prompt

on:
  schedule:
    - cron: "0 9 * * *"
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18

      - run: npm install

      - run: node bot.js
        env:
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
